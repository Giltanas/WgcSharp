name: Publish to NuGet

on:
  push:
    tags:
      - 'v*'

jobs:
  publish:
    runs-on: windows-latest
    environment: nuget
    permissions:
      id-token: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - run: dotnet restore src/WgcSharp/WgcSharp.csproj

      - run: dotnet pack src/WgcSharp/WgcSharp.csproj -c Release -o ./nupkg

      - name: NuGet login
        uses: NuGet/login@v1
        id: login
        with:
          user: Giltanas

      - name: Push to NuGet
        shell: pwsh
        run: |
          Get-ChildItem ./nupkg/*.nupkg | ForEach-Object {
            dotnet nuget push $_.FullName --api-key ${{steps.login.outputs.NUGET_API_KEY}} --source https://api.nuget.org/v3/index.json
          }
